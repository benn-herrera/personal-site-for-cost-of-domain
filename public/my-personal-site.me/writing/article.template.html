<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$title$ — my-personal-site.me</title>
        <link rel="icon" href="/favicon.ico" sizes="32x32" />
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="/style.css" />
        <link rel="alternate" type="text/markdown" href="./index.md" />
    </head>
    <body>
        <nav>
            <div class="name-rss">
                <a class="name-mark" href="/">my-personal-site.me</a>
                <a href="/feed/" class="rss-feed-link"
                    ><span class="rss-icon"></span> RSS</a
                >
            </div>
            <ul>
                <li><a href="/">writing</a></li>
                <li><a href="/projects/">projects</a></li>
                <li><a href="https://my-second-personal-site.me">about↗</a></li>
            </ul>
        </nav>

        <div class="post-header">
            $if(date)$
            <div class="meta">
                $date$$for(tags)$ &nbsp;·&nbsp; $tags$$endfor$
            </div>
            $endif$
            <h1>$title$</h1>
            $if(subtitle)$
            <p class="subtitle">$subtitle$</p>
            $endif$
        </div>

        <div class="post-body">$body$</div>
    </body>
</html>
